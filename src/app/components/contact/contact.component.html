<section class="contact" id="contacto">
  <!-- CTA Banner -->
  <div class="cta-banner" appScrollAnimate>
    <div class="cta-glow"></div>
    <div class="cta-particles">
      <span class="particle p1"></span>
      <span class="particle p2"></span>
      <span class="particle p3"></span>
    </div>
    <div class="container cta-inner">
      <h2 class="cta-title">
        Listo para <span class="highlight">transformar</span> tu idea?
      </h2>
      <p class="cta-subtitle">Hablemos sobre como podemos llevar tu proyecto al siguiente nivel.</p>
      <a href="#contacto-form" class="btn btn-primary cta-btn">
        <span>Empezar ahora</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- Contact Grid -->
  <div class="container" id="contacto-form">
    <div class="contact-grid">
      <div class="contact-left" appScrollAnimate="left">
        <span class="section-label">Contacto</span>
        <h2 class="section-title">
          Hagamos algo <span class="highlight">increible</span>
        </h2>
        <p class="contact-desc">
          Cuentanos tu idea. Respondemos en menos de 24 horas con un plan de accion personalizado.
        </p>

        <div class="contact-info">
          <div class="info-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <a href="mailto:hola&#64;vmsoftware.com">hola&#64;vmsoftware.com</a>
          </div>
          <div class="info-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>Remoto — Global</span>
          </div>
          <div class="info-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>Respuesta en &lt;24h</span>
          </div>
        </div>
      </div>

      <div class="contact-right" appScrollAnimate="right" animationDelay="0.1s">
        <form class="contact-form">
          <div class="form-edge-glow"></div>
          <div class="form-row">
            <div class="form-field">
              <input type="text" placeholder="Nombre">
            </div>
            <div class="form-field">
              <input type="email" placeholder="Email">
            </div>
          </div>
          <div class="form-field">
            <input type="text" placeholder="Tipo de proyecto">
          </div>
          <div class="form-field">
            <textarea rows="5" placeholder="Cuentanos sobre tu proyecto..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary form-submit">
            <span>Enviar mensaje</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
