<header [class.scrolled]="isScrolled">
  <div class="container header-inner">
    <a href="#" class="logo">
      <span class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor"/>
        </svg>
      </span>
      <span class="logo-text">Vm<span class="logo-accent">Software</span></span>
    </a>

    <nav class="nav-desktop">
      <ul>
        @for (link of navLinks; track link.label) {
          <li><a [href]="link.href">{{ link.label }}</a></li>
        }
      </ul>
    </nav>

    <a href="#contacto" class="btn btn-primary header-cta">
      <span>Iniciar proyecto</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </a>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <nav>
      <ul>
        @for (link of navLinks; track link.label) {
          <li><a [href]="link.href" (click)="toggleMobileMenu()">{{ link.label }}</a></li>
        }
      </ul>
      <a href="#contacto" class="btn btn-primary mobile-cta" (click)="toggleMobileMenu()">
        <span>Iniciar proyecto</span>
      </a>
    </nav>
  </div>
</header>
