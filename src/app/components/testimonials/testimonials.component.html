<section class="testimonials" id="nosotros">
  <div class="container">
    <span class="section-label">Testimonios</span>
    <h2 class="section-title" appScrollAnimate>
      Lo que dicen <span class="highlight">nuestros clientes</span>
    </h2>
    <p class="section-subtitle" appScrollAnimate animationDelay="0.1s">
      La confianza de nuestros clientes es nuestro mayor activo.
    </p>

    <div class="testimonials-grid">
      @for (t of testimonials; track t.name; let i = $index) {
        <div
          class="testimonial-card glow-border shimmer-card"
          appScrollAnimate
          [animationDelay]="(i * 0.1) + 's'"
        >
          <div class="shimmer-sweep"></div>

          <span class="quote-mark">"</span>

          <p class="quote-text">{{ t.quote }}</p>

          <div class="stars">
            @for (star of [1,2,3,4,5]; track star) {
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            }
          </div>

          <div class="author">
            <div class="author-avatar">{{ t.initials }}</div>
            <div class="author-info">
              <strong>{{ t.name }}</strong>
              <span>{{ t.role }}, {{ t.company }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
